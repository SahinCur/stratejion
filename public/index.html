<script>
/* Particle / network background */
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, dots;
  const N = 48;

  function resize() {
    W = canvas.width = window.innerWidth * window.devicePixelRatio;
    H = canvas.height = window.innerHeight * window.devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  function init() {
    resize();
    dots = Array.from({length: N}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.25 * window.devicePixelRatio,
      vy: (Math.random() - 0.5) * 0.25 * window.devicePixelRatio,
      r: (Math.random() * 1.2 + 0.6) * window.devicePixelRatio
    }));
  }
  function tick() {
    ctx.clearRect(0, 0, W, H);
    for (const d of dots) {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0 || d.x > W) d.vx *= -1;
      if (d.y < 0 || d.y > H) d.vy *= -1;
    }
    const maxDist = 160 * window.devicePixelRatio;
    for (let i = 0; i < dots.length; i++) {
      for (let j = i + 1; j < dots.length; j++) {
        const dx = dots[i].x - dots[j].x;
        const dy = dots[i].y - dots[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < maxDist) {
          const a = (1 - dist / maxDist) * 0.18;
          ctx.strokeStyle = 'rgba(42, 157, 143, ' + a + ')';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(dots[i].x, dots[i].y);
          ctx.lineTo(dots[j].x, dots[j].y);
          ctx.stroke();
        }
      }
    }
    for (const d of dots) {
      ctx.fillStyle = 'rgba(26, 26, 46, 0.45)';
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', init);
  init();
  tick();
})();
</script>

    <svg width={size} height={size} viewBox="0 0 32 32" aria-hidden="true">

      {/* bar 3 — long */}

      {/* dot atop bar 3 */}
      <circle cx="21.5" cy="3" r="2.2" fill={dot} />
    </svg>
  );
}

/* =========================================================
   PROMPT BUILDERS — Adaptive multi-phase system
   Token limiti (1024) nedeniyle her çağrı küçük tutulur.
   Çerçeveye göre 3-5 phase kullanılır.
   ========================================================= */

const SECTION_COUNTS = {
  '7s': 7, porter: 5, hoshin: 5, house: 5,
  bcg: 4, swot: 4, okr: 4, bsc: 4
};

function baseSysMsg(sector, topic, fw) {
  return `Sen deneyimli bir strateji danışmanısın. McKinsey, BCG, Bain metodolojilerini ve HBR literatürünü biliyorsun.
SEKTÖR: ${sector} | KONU: ${topic} | ÇERÇEVE: ${fw.name}
ÇERÇEVE TALİMATI: ${fw.extra}
KURAL: SADECE JSON döndür. Markdown, backtick, açıklama YAZMA. Metinler Türkçe olsun.`;
}

/* Phase 1A: Başlık, özet ve ilk N section */
function buildPhase1A(sector, topic, fw, count) {
  return `${baseSysMsg(sector, topic, fw)}

GÖREV: Çerçevenin ilk ${count} bileşeni için analiz üret.

JSON formatı:
{"frameworkTitle":"${fw.name} — ${sector}","executiveSummary":"2-3 cümle özet","sections":[{"title":"Bölüm başlığı","content":"3-4 cümle sektöre özel analiz"}]}

sections dizisinde TAM ${count} bölüm olsun. Her content en az 3 cümle.`;
}

/* Phase 1B: Kalan section'lar (sadece 5+ bölümlü çerçeveler için) */
function buildPhase1B(sector, topic, fw, existingTitles, remainingCount) {
  const list = existingTitles.map((t,i) => `${i+1}. ${t}`).join(', ');
  return `${baseSysMsg(sector, topic, fw)}

Zaten üretilen bölümler: ${list}

GÖREV: Çerçevenin KALAN ${remainingCount} bileşeni için analiz üret. Yukarıdakileri TEKRARLAMA.

JSON formatı:
{"sections":[{"title":"Bölüm başlığı","content":"3-4 cümle sektöre özel analiz"}]}

sections dizisinde TAM ${remainingCount} bölüm olsun.`;
}

/* Phase 2A: Her section için keyPoints + actionItems (max 4 section per call) */
function buildPhase2A(sector, topic, fw, titles) {
  const list = titles.map((t,i) => `${i+1}. ${t}`).join('\n');
  return `${baseSysMsg(sector, topic, fw)}

BÖLÜMLER:
${list}

GÖREV: Her bölüm için anahtar noktalar ve aksiyon önerileri üret.

JSON formatı:
{"sectionDetails":[{"title":"Bölüm başlığı AYNEN","keyPoints":["Nokta 1","Nokta 2","Nokta 3"],"actionItems":["Aksiyon 1","Aksiyon 2"]}]}

sectionDetails dizisinde TAM ${titles.length} kayıt olsun. title alanları yukarıdakilerle BİREBİR aynı olsun.`;
}

/* Phase 3: Stratejik öneriler, KPI'lar ve kaynaklar */
function buildPhase3(sector, topic, fw) {
  return `${baseSysMsg(sector, topic, fw)}

GÖREV: Bu çerçeve analizi için stratejik öneriler, KPI önerileri ve referans kaynakları üret.

JSON formatı:
{"strategicRecommendations":["Öneri 1","Öneri 2","Öneri 3","Öneri 4"],"kpiSuggestions":["KPI 1","KPI 2","KPI 3","KPI 4","KPI 5","KPI 6"],"sources":["Kaynak 1","Kaynak 2","Kaynak 3","Kaynak 4"]}

KURALLAR:
- strategicRecommendations: 4 somut, uygulanabilir öneri
- kpiSuggestions: 6 ölçülebilir KPI, birimi belirt
- sources: 4 referans (yazar/kurum/makale)`;
}

/* Auto-repair truncated JSON by closing dangling brackets/quotes.
   Walks the string respecting strings/escapes; tracks { [ stack;
   if it ends inside a string, closes the string; trims a trailing
   comma; then appends matching closers in reverse order. */
function fixJSON(raw) {
  if (!raw) return raw;
  let s = raw;
  const stack = [];
  let inStr = false;
  let escape = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (escape) { escape = false; continue; }
    if (ch === '\\') { escape = true; continue; }
    if (inStr) {
      if (ch === '"') inStr = false;
      continue;
    }
    if (ch === '"') { inStr = true; continue; }
    if (ch === '{' || ch === '[') stack.push(ch);
    else if (ch === '}') { if (stack[stack.length - 1] === '{') stack.pop(); }
    else if (ch === ']') { if (stack[stack.length - 1] === '[') stack.pop(); }
  }
  if (inStr) s += '"';
  // Trim trailing comma/whitespace before closing brackets
  s = s.replace(/,\s*$/g, '');
  while (stack.length) {
    const open = stack.pop();
    // Drop a trailing comma before we close
    s = s.replace(/,\s*$/g, '');
    s += open === '{' ? '}' : ']';
  }
  return s;
}

/* =========================================================
   API CALL — Netlify serverless function üzerinden Anthropic API
   Claude.ai artifact ortamında window.claude.complete kullanır,
   Netlify/standalone'da ise serverless proxy kullanır.
   ========================================================= */
async function callClaude(prompt) {
  // Claude.ai artifact ortamında mıyız?
  if (window.claude && typeof window.claude.complete === 'function') {
    return await window.claude.complete(prompt);
  }

  // Netlify / standalone: serverless function proxy
  const res = await fetch('/.netlify/functions/claude-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, max_tokens: 2048 })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Bilinmeyen hata' }));
    throw new Error(err.error || `API hatası: ${res.status}`);
  }

  const data = await res.json();
  if (!data.text) throw new Error('API yanıtı boş');
  return data.text;
}

function extractJson(text) {
  if (!text) throw new Error('Boş yanıt');
  // strip fences
  let t = text.trim();
  t = t.replace(/^```(json|JSON)?\s*/i, '').replace(/```\s*$/i, '').trim();
  // narrow to JSON object span
  const first = t.indexOf('{');
  const last = t.lastIndexOf('}');
  if (first >= 0) {
    t = last > first ? t.slice(first, last + 1) : t.slice(first);
  }
  // try direct
  try { return JSON.parse(t); } catch (e) {}
  // try with bracket auto-close
  try { return JSON.parse(fixJSON(t)); } catch (e) {}
  throw new Error('JSON parse edilemedi');
}

/* =========================================================
   APP ROOT
   ========================================================= */
function App() {
  const [step, setStep] = useState('hero'); // hero | params | loading | results | error
  const [phase, setPhase] = useState(null); // phase1 | phase2 | null
  const [sector, setSector] = useState('');
  const [topic, setTopic] = useState('');
  const [framework, setFramework] = useState('');
  const [result, setResult] = useState(null);
  const [errorMsg, setErrorMsg] = useState('');

  const fwObj = useMemo(() => FRAMEWORKS.find(f => f.id === framework), [framework]);

  const generate = async () => {
    if (!sector || !topic.trim() || !fwObj) return;
    setStep('loading');
    setResult(null);
    setErrorMsg('');

    const totalSections = SECTION_COUNTS[fwObj.id] || 4;
    const needsSplit = totalSections > 4;
    const firstBatch = needsSplit ? 4 : totalSections;
    const totalPhases = needsSplit ? 4 : 3;

    try {
      let allSections = [];
      let frameworkTitle = '';
      let executiveSummary = '';
      let currentPhase = 0;

      // ---- Phase 1A: İlk N section + başlık + özet ----
      currentPhase++;
      setPhase(`${currentPhase}/${totalPhases}`);
      const text1a = await callClaude(buildPhase1A(sector, topic, fwObj, firstBatch));
      const part1a = extractJson(text1a);
      if (!part1a.sections || part1a.sections.length === 0) {
        throw new Error('Birinci aşamada beklenen yapıda yanıt alınamadı.');
      }
      frameworkTitle = part1a.frameworkTitle || `${fwObj.name} — ${sector}`;
      executiveSummary = part1a.executiveSummary || '';
      allSections = [...part1a.sections];

      // ---- Phase 1B (sadece 5+ bölümlü çerçeveler): Kalan section'lar ----
      if (needsSplit) {
        currentPhase++;
        setPhase(`${currentPhase}/${totalPhases}`);
        const existingTitles = allSections.map(s => s.title).filter(Boolean);
        const remaining = totalSections - allSections.length;
        if (remaining > 0) {
          const text1b = await callClaude(buildPhase1B(sector, topic, fwObj, existingTitles, remaining));
          const part1b = extractJson(text1b);
          if (part1b.sections && Array.isArray(part1b.sections)) {
            allSections = [...allSections, ...part1b.sections];
          }
        }
      }

      // ---- Phase 2A: Her section için keyPoints + actionItems ----
      // Eğer çok fazla section varsa ikiye böl
      currentPhase++;
      setPhase(`${currentPhase}/${totalPhases}`);
      const allTitles = allSections.map(s => s.title).filter(Boolean);
      
      let allDetails = [];
      if (allTitles.length > 4) {
        // İlk 4 section için detay
        const text2a1 = await callClaude(buildPhase2A(sector, topic, fwObj, allTitles.slice(0, 4)));
        const part2a1 = extractJson(text2a1);
        if (part2a1.sectionDetails) allDetails = [...part2a1.sectionDetails];
        
        // Kalan section'lar için detay (aynı phase içinde)
        const text2a2 = await callClaude(buildPhase2A(sector, topic, fwObj, allTitles.slice(4)));
        const part2a2 = extractJson(text2a2);
        if (part2a2.sectionDetails) allDetails = [...allDetails, ...part2a2.sectionDetails];
      } else {
        const text2a = await callClaude(buildPhase2A(sector, topic, fwObj, allTitles));
        const part2a = extractJson(text2a);
        if (part2a.sectionDetails) allDetails = part2a.sectionDetails;
      }

      // ---- Phase 3: Stratejik öneriler + KPI'lar + Kaynaklar ----
      currentPhase++;
      setPhase(`${currentPhase}/${totalPhases}`);
      const text3 = await callClaude(buildPhase3(sector, topic, fwObj));
      const part3 = extractJson(text3);

      // ---- MERGE ----
      const detailsByTitle = {};
      allDetails.forEach(d => {
        if (d && d.title) detailsByTitle[d.title.trim()] = d;
      });

      const mergedSections = allSections.map((s, i) => {
        const byTitle = s.title ? detailsByTitle[s.title.trim()] : null;
        const byIdx = allDetails[i];
        const detail = byTitle || byIdx || {};
        return {
          title: s.title,
          content: s.content,
          keyPoints: detail.keyPoints || [],
          actionItems: detail.actionItems || []
        };
      });

      const merged = {
        frameworkTitle,
        executiveSummary,
        sections: mergedSections,
        strategicRecommendations: part3.strategicRecommendations || [],
        kpiSuggestions: part3.kpiSuggestions || [],
        sources: part3.sources || []
      };

      setResult(merged);
      setPhase(null);
      setStep('results');
    } catch (err) {
      console.error(err);
      setErrorMsg(err.message || 'Tekrar deneyin.');
      setPhase(null);
      setStep('error');
    }
  };

  const reset = () => {
    setStep('hero');
    setSector(''); setTopic(''); setFramework(''); setResult(null);
  };

  const showNav = step !== 'loading';

  return (
    <>
      {showNav && <Navbar onHome={reset} onMethodology={() => setStep('metodoloji')} />}
      {step === 'hero' && <Hero onStart={() => setStep('params')} onMethodology={() => setStep('metodoloji')} />}
      {step === 'metodoloji' && window.MethodologyScreen && (
        <window.MethodologyScreen
          frameworks={FRAMEWORKS}
          onBack={reset}
          onStart={() => setStep('params')}
        />
      )}
      {step === 'params' && (
        <ParamForm
          sector={sector} setSector={setSector}
          topic={topic} setTopic={setTopic}
          framework={framework} setFramework={setFramework}
          onGenerate={generate}
          onBack={reset}
        />
      )}
      {step === 'loading' && <LoadingScreen phase={phase} />}
      {step === 'results' && result && fwObj && (
        <ResultsScreen
          data={result}
          framework={fwObj}
          sector={sector}
          topic={topic}
          onRestart={reset}
        />
      )}
      {step === 'error' && (
        <ErrorScreen
          msg={errorMsg}
          onRetry={generate}
          onBack={() => setStep('params')}
        />
      )}
      {showNav && <Footer />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
